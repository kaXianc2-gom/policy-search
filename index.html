<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="政策文件搜索工具 — 输入名称从官网抓取+粘贴即搜+本地缓存，同义词扩展+关键词高亮">
<meta name="theme-color" content="#8b5cf6">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
<title>PolicySearch — 政策文件搜索</title>
<style>
:root {
  --primary: #8b5cf6; --primary-dark: #7c3aed;
  --accent: #a78bfa; --accent-light: #f5f3ff;
  --bg: #f2efe8; --card: rgba(255,255,255,0.7);
  --border: rgba(0,0,0,0.07); --text: #1d1d1f; --muted: #6e6e73;
  --success: #16a34a; --danger: #dc2626; --warning: #d97706;
  --radius: 20px; --radius-sm: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
  --spring: 0.35s cubic-bezier(0.22, 0.1, 0.2, 1);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --highlight: #fef08a;
}
[data-theme="dark"] {
  --primary: #a78bfa; --primary-dark: #8b5cf6;
  --accent: #c4b5fd; --accent-light: #1e1b4b;
  --bg: #1a1917; --card: rgba(36,35,33,0.76);
  --border: rgba(255,255,255,0.07); --text: #f5f5f7; --muted: #98989d;
  --highlight: #854d0e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;transition:background 0.4s ease,color 0.4s ease;letter-spacing:-0.01em var(--spring),color var(--spring)}
.container{animation:pageEnter 0.45s var(--spring);max-width:1000px;margin:0 auto;padding:16px 20px}

.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:16px 24px;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{font-size:32px}
.header-title{font-size:22px;font-weight:800}
.header-subtitle{font-size:13px;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:12px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--accent-light);color:var(--primary-dark);border-radius:20px;font-size:13px;font-weight:600}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--spring);font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn-outline:hover{background:var(--accent-light)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:var(--danger);color:#fff}
.theme-toggle{width:40px;height:40px;border:2px solid var(--border);border-radius:50%;background:var(--card);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all var(--spring)}
.theme-toggle:hover{border-color:var(--primary);transform:rotate(15deg)}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:16px;border:1px solid var(--border)}

/* ── Search ── */
.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;background:var(--card);color:var(--text);transition:border-color var(--spring)}
.search-box input:focus{outline:none;border-color:var(--primary)}
.search-box input::placeholder{color:var(--muted)}

/* ── Toolbar ── */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.filter-tag{padding:4px 14px;border:1px solid var(--border);border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--spring);color:var(--muted);background:var(--card)}
.filter-tag:hover,.filter-tag.active{border-color:var(--primary);color:var(--primary);background:var(--accent-light)}

/* ── Policy Catalog ── */
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:16px}
.catalog-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--spring);background:var(--card)}
.catalog-item:hover{border-color:var(--primary);background:var(--accent-light)}
.catalog-item .ci-status{font-size:11px;margin-left:auto;color:var(--muted)}
.catalog-item.cached .ci-status{color:var(--success)}

/* ── Results ── */
.result-count{font-size:13px;color:var(--muted);margin-bottom:12px}
.result-item{padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;transition:all var(--spring);cursor:pointer}
.result-item:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.result-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.result-title{font-weight:700;font-size:15px}
.result-source{font-size:12px;color:var(--muted)}
.result-snippet{font-size:14px;line-height:1.7;color:var(--text)}
.result-snippet mark{background:var(--highlight);color:inherit;padding:1px 3px;border-radius:2px;font-weight:600}
.result-score{font-size:11px;color:var(--muted)}

/* ── Synonym info ── */
.synonym-info{font-size:12px;color:var(--muted);margin-bottom:12px;padding:8px 12px;background:var(--accent-light);border-radius:var(--radius-sm)}
.synonym-info span{font-weight:600;color:var(--primary)}

/* ── Fetch status ── */
.fetch-status{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin:8px 0;display:none}
.fetch-status.loading{display:block;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.fetch-status.success{display:block;background:#f0fdf4;color:#065f46;border:1px solid #bbf7d0}
.fetch-status.error{display:block;background:#fef2f2;color:#991b1b;border:1px solid #fecaca}

/* ── Toast ── */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:2000;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;color:#fff;background:rgba(30,30,32,0.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:var(--shadow-lg);animation:toastIn .3s ease}
.toast.success{background:var(--success)}
.toast.warn{background:var(--warning);color:#1e293b}
.toast.error{background:var(--danger)}
.toast.out{animation:toastOut .3s ease forwards}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);max-width:700px;width:90vw;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .3s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:36px;height:36px;border:none;background:transparent;font-size:24px;cursor:pointer;border-radius:50%;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--border)}
.modal-body{padding:24px;overflow-y:auto;flex:1;line-height:1.8;font-size:14px}
.modal-body textarea{width:100%;min-height:200px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);resize:vertical}
.modal-body textarea:focus{outline:none;border-color:var(--primary)}
.modal-body input[type="text"]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}
.modal-body input[type="text"]:focus{outline:none;border-color:var(--primary)}

.empty-state{text-align:center;padding:48px 24px}
.empty-icon{font-size:56px;margin-bottom:12px}
.empty-title{font-size:18px;font-weight:700;margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--muted);max-width:400px;margin:0 auto}

.footer{text-align:center;padding:16px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:24px}

@keyframes pageEnter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(16px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@media (max-width:900px){
  .container{padding:10px 12px}
  .header{padding:12px 16px}
  .card{padding:16px}
  .catalog-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
@media (max-width:480px){
  .header-title{font-size:16px}
  .header-logo{font-size:24px}
  .btn{padding:8px 14px;font-size:12px}
}

/* ── Atmosphere ── */
.atmo{position:fixed;inset:0;pointer-events:none;z-index:0}
.atmo .orb{position:absolute;border-radius:50%;filter:blur(140px);opacity:0.35}
.atmo .orb:nth-child(1){width:60vw;height:60vw;background:radial-gradient(circle,rgba(210,160,100,0.12),transparent);top:-25vh;left:-20vw}
.atmo .orb:nth-child(2){width:50vw;height:50vw;background:radial-gradient(circle,rgba(100,175,165,0.09),transparent);bottom:-20vh;right:-15vw}
.grid-texture{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.18;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 55% at 50% 45%,black 15%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse 70% 55% at 50% 45%,black 15%,transparent 70%)}

.page-exit-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);opacity:0;pointer-events:none;transition:opacity 0.3s ease}.page-exit-overlay.go{opacity:1;pointer-events:all}
</style>
</head>

<div class="atmo"><div class="orb"></div><div class="orb"></div></div>

<script>

// ═══════════════════════════════════════════════

const POLICY_CATALOG = [

// ═══════════════════════════════════════════════
//  SYNONYM DICTIONARY
// ═══════════════════════════════════════════════
const SYNONYM_MAP = {
  '乡村振兴': ['农业农村现代化','乡村发展','三农工作','农村振兴','千万工程'],

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let DOCUMENTS = [];    // [{ id, title, url, category, content, fetchedAt }]
let ACTIVE_DOC_ID = null; // For viewing full text

// ═══════════════════════════════════════════════
//  CORS PROXY RACING — 3 proxies, fastest wins
// ═══════════════════════════════════════════════
const CORS_PROXIES = [
  function(url) { return 'https://corsproxy.io/?' + encodeURIComponent(url); },
  function(url) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); },
  function(url) { return 'https://cors-anywhere.herokuapp.com/' + url; }
];

function fetchWithTimeout(url, ms) {
  let ctrl = new AbortController();
  let timer = setTimeout(function() { ctrl.abort(); }, ms);
  return fetch(url, { signal: ctrl.signal }).finally(function() { clearTimeout(timer); });
}

async function fetchWithProxy(url) {
  let errors = [];
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    try {
      let proxyUrl = CORS_PROXIES[i](url);
      let resp = await fetchWithTimeout(proxyUrl, 20000);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      let text = await resp.text();
      if (text.length < 500) throw new Error('Response too short (' + text.length + ' chars)');
      return text;
    } catch(e) {
      errors.push('Proxy ' + (i+1) + ': ' + e.message);
    }
  }
  throw new Error('所有代理均失败：' + errors.join(' | '));
}

// ═══════════════════════════════════════════════
//  HTML → TEXT EXTRACTION
// ═══════════════════════════════════════════════
function extractText(html) {
  let doc = new DOMParser().parseFromString(html, 'text/html');

  // Remove noise
  doc.querySelectorAll('script,style,nav,footer,header,.header,.footer,.nav,.sidebar,.breadcrumb,.share,.comment,.pagination,link[rel="stylesheet"],noscript,iframe').forEach(function(el) { el.remove(); });

  // Try content containers first
  let selectors = ['article', 'main', '.article', '.content', '#content', '.main', '.text', '.post', '.entry', '#UCAP-CONTENT', '.pages_content', '.con_text', '.TRS_Editor', '.Custom_UnionStyle'];
  for (let i = 0; i < selectors.length; i++) {
    let el = doc.querySelector(selectors[i]);
    if (el && el.textContent.trim().length > 300) {
      return cleanText(el.textContent);
    }
  }

  // Fallback: body
  let body = doc.body;
  if (body) {
    let text = body.textContent || '';
    if (text.trim().length > 300) return cleanText(text);
  }

  // Last resort: whole document
  return cleanText(doc.documentElement.textContent || '');
}

function cleanText(text) {
  return text
    .replace(/[\t\r]/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .replace(/ {2,}/g, ' ')
    .replace(/\n /g, '\n')
    .trim();
}

// ═══════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════
function saveDocs() {
  try {
    localStorage.setItem('gwy_policysearch_docs', JSON.stringify(DOCUMENTS));
  } catch(e) {
    // Quota exceeded: prune oldest docs
    if (DOCUMENTS.length > 3) {
      DOCUMENTS.sort(function(a,b) { return (b.fetchedAt||0) - (a.fetchedAt||0); });
      DOCUMENTS = DOCUMENTS.slice(0, Math.floor(DOCUMENTS.length * 0.7));
      try { localStorage.setItem('gwy_policysearch_docs', JSON.stringify(DOCUMENTS)); } catch(e2) {}
    }
  }
}

function loadDocs() {
  try {
    let d = localStorage.getItem('gwy_policysearch_docs');
    if (d) DOCUMENTS = JSON.parse(d);
  } catch(e) { DOCUMENTS = []; }
}

// ═══════════════════════════════════════════════
//  FETCH & ADD DOCUMENT
// ═══════════════════════════════════════════════
async function fetchAndAddDoc(title, url, category) {
  let statusEl = document.getElementById('fetchStatus');
  if (!statusEl) {
    statusEl = document.createElement('div');
    statusEl.id = 'fetchStatus';
    statusEl.className = 'fetch-status loading';
    document.getElementById('addModalBody').appendChild(statusEl);
  }
  statusEl.style.display = 'block';
  statusEl.className = 'fetch-status loading';
  statusEl.textContent = '🌐 正在从官网抓取：' + url + ' …';

  try {
    let html = await fetchWithProxy(url);
    let text = extractText(html);

    if (text.length < 200) throw new Error('提取内容过短（' + text.length + '字符），页面结构可能异常');

    // Dedup by URL
    let existing = DOCUMENTS.findIndex(function(d) { return d.url === url; });
    let doc = {
      id: 'doc_' + Date.now(),
      title: title,
      url: url,
      category: category || '综合',
      content: text.substring(0, 50000), // Cap at 50K chars
      fetchedAt: Date.now()
    };

    if (existing >= 0) {
      DOCUMENTS[existing] = doc;
      statusEl.className = 'fetch-status success';
      statusEl.textContent = '✅ 已更新：' + title + '（' + formatSize(text.length) + '）';
    } else {
      DOCUMENTS.push(doc);
      statusEl.className = 'fetch-status success';
      statusEl.textContent = '✅ 抓取成功：' + title + '（' + formatSize(text.length) + '）';
    }

    saveDocs();
    updateDocCount();
    renderCatalogInModal();
    return doc;
  } catch(e) {
    statusEl.className = 'fetch-status error';
    statusEl.innerHTML = '❌ 抓取失败：' + e.message +
      '<br><br><strong>建议：</strong>点击下方按钮在新标签打开原文，再粘贴文本' +
      '<br><a href="' + url + '" target="_blank" rel="noopener" style="color:var(--primary);word-break:break-all">' + url + '</a>';
    throw e;
  }
}

function formatSize(bytes) {
  if (bytes > 10000) return Math.round(bytes/1000) + 'K 字符';
  return bytes + ' 字符';
}

// ═══════════════════════════════════════════════
//  SEARCH ENGINE (substring match + TF scoring)
// ═══════════════════════════════════════════════
function expandQuery(query) {
  let terms = [query];
  let q = query.trim();
  Object.keys(SYNONYM_MAP).forEach(function(key) {
    if (key.indexOf(q) !== -1 || q.indexOf(key) !== -1) {
      if (terms.indexOf(key) === -1) terms.push(key);
      SYNONYM_MAP[key].forEach(function(v) {
        if (terms.indexOf(v) === -1) terms.push(v);
      });
    }
    SYNONYM_MAP[key].forEach(function(v) {
      if (v.indexOf(q) !== -1 || q.indexOf(v) !== -1) {
        if (terms.indexOf(key) === -1) terms.push(key);
        if (terms.indexOf(v) === -1) terms.push(v);
      }
    });
  });
  return terms;
}

function search(query) {
  if (!query.trim() || !DOCUMENTS.length) return { results: [], expandedTerms: [] };

  let expandedTerms = expandQuery(query.trim());
  let docScores = {};

  expandedTerms.forEach(function(term) {
    DOCUMENTS.forEach(function(doc) {
      let count = 0, pos = 0, text = doc.content;
      while ((pos = text.indexOf(term, pos)) !== -1) { count++; pos += term.length; }
      if (count > 0) {
        let tf = count / (1 + text.length / 500); // TF with length normalization
        docScores[doc.id] = (docScores[doc.id] || 0) + tf;
      }
    });
  });

  let results = Object.keys(docScores).map(function(docId) {
    let doc = DOCUMENTS.find(function(d) { return d.id === docId; });
    return {
      doc: doc,
      score: Math.round(docScores[docId] * 100),
      highlights: getHighlights(doc, expandedTerms)
    };
  }).filter(function(r) { return r.doc; });

  results.sort(function(a, b) { return b.score - a.score; });

  return {
    results: results,
    expandedTerms: expandedTerms.filter(function(t) { return t !== query.trim(); })
  };
}

function getHighlights(doc, terms) {
  let text = doc.content;
  let snippets = [];
  let windowSize = 100;

  // Find the highest-density region for each term
  let positions = [];
  terms.forEach(function(term) {
    let pos = 0;
    while ((pos = text.indexOf(term, pos)) !== -1) {
      positions.push(pos);
      pos += term.length;
    }
  });
  positions.sort(function(a,b) { return a - b; });

  // Cluster positions and extract snippets
  if (positions.length === 0) {
    snippets.push(text.substring(0, Math.min(text.length, 300)) + (text.length > 300 ? '…' : ''));
  } else {
    let clusters = [];
    let cluster = [positions[0]];
    for (let i = 1; i < positions.length; i++) {
      if (positions[i] - positions[i-1] < windowSize * 2) {
        cluster.push(positions[i]);
      } else {
        clusters.push(cluster);
        cluster = [positions[i]];
      }
    }
    clusters.push(cluster);

    clusters.slice(0, 3).forEach(function(cl) {
      let mid = cl[Math.floor(cl.length / 2)];
      let start = Math.max(0, mid - windowSize);
      let end = Math.min(text.length, mid + windowSize);
      let snippet = text.substring(start, end);
      if (start > 0) snippet = '…' + snippet;
      if (end < text.length) snippet = snippet + '…';
      terms.forEach(function(t) {
        snippet = snippet.split(t).join('<mark>' + t + '</mark>');
      });
      snippets.push(snippet);
    });
  }

  return snippets;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function doSearch() {
  let query = document.getElementById('searchInput').value;
  if (!query.trim()) {
    document.getElementById('searchResults').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">输入关键词开始搜索</div><div class="empty-desc">先在下方"政策目录"抓取文档，或粘贴文本，再搜索</div></div>';
    document.getElementById('resultCount').textContent = '';
    document.getElementById('synonymInfo').style.display = 'none';
    return;
  }

  if (!DOCUMENTS.length) {
    document.getElementById('searchResults').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">没有文档可搜索</div><div class="empty-desc">点击"从政策目录抓取"添加政策文档</div></div>';
    return;
  }

  let result = search(query);
  document.getElementById('resultCount').textContent = '找到 ' + result.results.length + ' 篇相关文档（共 ' + DOCUMENTS.length + ' 篇）';

  if (result.expandedTerms.length) {
    document.getElementById('synonymInfo').style.display = '';
    document.getElementById('synonymInfo').innerHTML = '🔄 同义词扩展：<span>' + result.expandedTerms.join('、') + '</span>';
  } else {
    document.getElementById('synonymInfo').style.display = 'none';
  }

  if (!result.results.length) {
    document.getElementById('searchResults').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">未找到相关结果</div><div class="empty-desc">试试其他关键词，或抓取更多政策文档</div></div>';
    return;
  }

  let html = '';
  result.results.forEach(function(r) {
    html += '<div class="result-item" onclick="viewDoc(\'' + r.doc.id + '\')">';
    html += '<div class="result-header"><span class="result-title">📄 ' + escHtml(r.doc.title) + '</span>';
    html += '<span class="result-source">' + escHtml(r.doc.category) + ' · ' + formatDate(r.doc.fetchedAt) + '</span></div>';
    if (r.highlights.length) {
      html += '<div class="result-snippet">' + r.highlights[0] + '</div>';
      if (r.highlights.length > 1) {
        html += '<div class="result-snippet" style="margin-top:8px">' + r.highlights[1] + '</div>';
      }
    }
    html += '<div class="result-score" style="margin-top:4px">词频相关度：' + r.score + '</div>';
    html += '</div>';
  });
  document.getElementById('searchResults').innerHTML = html;
}

function updateDocCount() {
  document.getElementById('docCount').textContent = '📚 ' + DOCUMENTS.length + ' 份文档';
}

function formatDate(ts) {
  if (!ts) return '';
  let d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function viewDoc(docId) {
  let doc = DOCUMENTS.find(function(d) { return d.id === docId; });
  if (!doc) return;
  ACTIVE_DOC_ID = docId;
  document.getElementById('modalTitle').textContent = doc.title;
  let html = '<div style="margin-bottom:12px;font-size:13px;color:var(--muted)">分类：' + escHtml(doc.category) + ' · 来源：<a href="' + doc.url + '" target="_blank" rel="noopener" style="color:var(--primary)">' + escHtml(doc.url) + '</a> · ' + formatDate(doc.fetchedAt) + '</div>';
  html += '<div style="margin-bottom:12px"><button class="btn btn-outline btn-sm" onclick="deleteDoc(\'' + docId + '\')">🗑 删除此文档</button></div>';
  html += '<div style="white-space:pre-wrap;max-height:60vh;overflow-y:auto">' + escHtml(doc.content) + '</div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function deleteDoc(docId) {
  if (!confirm('确定删除这篇文档吗？')) return;
  DOCUMENTS = DOCUMENTS.filter(function(d) { return d.id !== docId; });
  saveDocs();
  updateDocCount();
  closeModal();
  doSearch();
  toast('🗑 已删除', 'success');
}

// ═══════════════════════════════════════════════
//  ADD DOCUMENT MODALS
// ═══════════════════════════════════════════════
function renderCatalogInModal() {
  let html = '<div style="margin-bottom:16px"><strong>📋 政策目录</strong>（点击抓取，已缓存显示 ✅）</div>';
  html += '<div class="catalog-grid">';
  POLICY_CATALOG.forEach(function(p) {
    let isCached = DOCUMENTS.some(function(d) { return d.url === p.url; });
    let cls = isCached ? 'catalog-item cached' : 'catalog-item';
    html += '<div class="' + cls + '" onclick="addFromCatalog(\'' + escHtml(p.title).replace(/'/g,"&#39;") + '\',\'' + p.url + '\',\'' + p.cat + '\')">';
    html += escHtml(p.title);
    html += '<span class="ci-status">' + (isCached ? '✅' : '📥') + '</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="fetch-status" id="fetchStatus"></div>';
  html += '<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)"><strong>📋 或粘贴文本</strong>（作为后备方案）</div>';
  html += '<div style="margin-top:8px"><input type="text" id="pasteTitle" placeholder="文档名称，如：2025年政府工作报告"></div>';
  html += '<textarea id="pasteContent" placeholder="在此粘贴政策全文…" style="margin-top:8px"></textarea>';
  html += '<button class="btn btn-primary btn-sm" id="btnPasteConfirm" style="margin-top:8px">📋 导入粘贴文本</button>';

  document.getElementById('addModalBody').innerHTML = html;
  document.getElementById('addModalOverlay').classList.add('open');

  document.getElementById('btnPasteConfirm').addEventListener('click', function() {
    let title = document.getElementById('pasteTitle').value.trim();
    let content = document.getElementById('pasteContent').value.trim();
    if (!title) { toast('⚠️ 请输入文档名称', 'warn'); return; }
    if (content.length < 100) { toast('⚠️ 内容太短，至少100字符', 'warn'); return; }

    let doc = {
      id: 'doc_' + Date.now(),
      title: title,
      url: '（粘贴导入）',
      category: '综合',
      content: content.substring(0, 50000),
      fetchedAt: Date.now()
    };
    DOCUMENTS.push(doc);
    saveDocs();
    updateDocCount();
    closeAddModal();
    doSearch();
    toast('✅ 已导入：' + title + '（' + formatSize(content.length) + '）', 'success');
  });
}

async function addFromCatalog(title, url, cat) {
  let btn = document.querySelector('.catalog-item.cached');
  try {
    await fetchAndAddDoc(title, url, cat);
    updateDocCount();
    doSearch();
  } catch(e) {
    // Error already shown in fetchStatus
  }
}

function showAddFromURL() {
  let html = '<div style="margin-bottom:8px"><strong>🔗 输入政策页面 URL</strong></div>';
  html += '<input type="text" id="customURL" placeholder="https://www.gov.cn/zhengce/...">';
  html += '<input type="text" id="customTitle" placeholder="文档名称" style="margin-top:8px">';
  html += '<button class="btn btn-primary btn-sm" id="btnFetchURL" style="margin-top:8px">🌐 抓取</button>';
  html += '<div class="fetch-status" id="fetchStatus"></div>';
  html += '<div style="margin-top:12px;font-size:12px;color:var(--muted)">支持 gov.cn、各地政府网站的政策页面</div>';

  document.getElementById('addModalBody').innerHTML = html;
  document.getElementById('addModalOverlay').classList.add('open');

  document.getElementById('btnFetchURL').addEventListener('click', async function() {
    let url = document.getElementById('customURL').value.trim();
    let title = document.getElementById('customTitle').value.trim();
    if (!url) { toast('⚠️ 请输入 URL', 'warn'); return; }
    if (!title) title = url.split('/').pop().replace(/\.htm(l)?$/,'') || '未命名文档';
    try {
      await fetchAndAddDoc(title, url, '自定义');
      updateDocCount();
      doSearch();
    } catch(e) {}
  });
}

function showPasteText() {
  let html = '<div style="margin-bottom:8px"><strong>📋 粘贴政策文本</strong></div>';
  html += '<input type="text" id="pasteTitle2" placeholder="文档名称">';
  html += '<textarea id="pasteContent2" placeholder="在此粘贴政策全文…" style="margin-top:8px;min-height:250px"></textarea>';
  html += '<button class="btn btn-primary btn-sm" id="btnPasteConfirm2" style="margin-top:8px">📋 导入</button>';
  html += '<div style="margin-top:12px;font-size:12px;color:var(--muted)">适用于网页抓取失败时手动复制粘贴。从 gov.cn 打开原文 → Ctrl+A 全选 → Ctrl+C 复制 → 回到此处 Ctrl+V 粘贴</div>';

  document.getElementById('addModalBody').innerHTML = html;
  document.getElementById('addModalOverlay').classList.add('open');

  document.getElementById('btnPasteConfirm2').addEventListener('click', function() {
    let title = document.getElementById('pasteTitle2').value.trim();
    let content = document.getElementById('pasteContent2').value.trim();
    if (!title) { toast('⚠️ 请输入文档名称', 'warn'); return; }
    if (content.length < 100) { toast('⚠️ 内容太短', 'warn'); return; }

    let doc = {
      id: 'doc_' + Date.now(),
      title: title,
      url: '（粘贴导入）',
      category: '自定义',
      content: content.substring(0, 50000),
      fetchedAt: Date.now()
    };
    DOCUMENTS.push(doc);
    saveDocs();
    updateDocCount();
    closeAddModal();
    doSearch();
    toast('✅ 已导入：' + title + '（' + formatSize(content.length) + '）', 'success');
  });
}

function clearAllDocs() {
  if (!DOCUMENTS.length) return;
  if (!confirm('确定删除全部 ' + DOCUMENTS.length + ' 篇文档吗？此操作不可恢复。')) return;
  DOCUMENTS = [];
  saveDocs();
  updateDocCount();
  document.getElementById('searchResults').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">文档已清空</div><div class="empty-desc">点击"从政策目录抓取"重新添加</div></div>';
  toast('🗑 已清空全部文档', 'success');
}

// ═══════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, type) {
  let el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.setAttribute('role','status');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.classList.add('out'); setTimeout(function() { if(el.parentNode)el.parentNode.removeChild(el); }, 300); }, 2500);
}

function toggleTheme() {
  let cur = document.documentElement.getAttribute('data-theme');
  let next = cur === 'dark' ? '' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeToggle').textContent = next ? '☀️' : '🌙';
  try { localStorage.setItem('gwy_policysearch_theme', next || 'light'); } catch(e) {}
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeAddModal() { document.getElementById('addModalOverlay').classList.remove('open'); }

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  loadDocs();
  updateDocCount();

  // Theme
  try {
    let tm = localStorage.getItem('gwy_policysearch_theme') || localStorage.getItem('policysearch_theme');
    if (tm === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  } catch(e) {}
  document.getElementById('themeToggle').textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  // Search
  document.getElementById('btnSearch').addEventListener('click', doSearch);
  document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });

  // Add document buttons
  document.getElementById('btnAddFromCatalog').addEventListener('click', renderCatalogInModal);
  document.getElementById('btnAddFromURL').addEventListener('click', showAddFromURL);
  document.getElementById('btnPasteText').addEventListener('click', showPasteText);
  document.getElementById('btnClearAll').addEventListener('click', clearAllDocs);

  // Modals
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  document.getElementById('addModalClose').addEventListener('click', closeAddModal);
  document.getElementById('addModalOverlay').addEventListener('click', function(e) { if (e.target === this) closeAddModal(); });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeModal(); closeAddModal(); }
  });

  // Show initial state
  if (DOCUMENTS.length) {
    document.getElementById('searchResults').innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-title">已缓存 ' + DOCUMENTS.length + ' 篇文档</div><div class="empty-desc">输入关键词开始搜索</div></div>';
  } else {
    document.getElementById('searchResults').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">PolicySearch v2.0</div><div class="empty-desc">点击 <strong>从政策目录抓取</strong> 添加文档，或 <strong>粘贴文本</strong> 导入。文档缓存在浏览器本地。</div></div>';
  }
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
window.addEventListener('beforeunload',function(){var e=document.getElementById('exitOverlay');if(e)e.classList.add('go');});
</script>
