<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PolicySearch — 政策文件搜索</title>
<style>
:root {
  --primary: #8b5cf6; --primary-dark: #7c3aed;
  --accent: #a78bfa; --accent-light: #f5f3ff;
  --bg: #f8fafc; --card: #ffffff;
  --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
  --success: #16a34a; --danger: #dc2626; --warning: #d97706;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --highlight: #fef08a;
}
[data-theme="dark"] {
  --primary: #a78bfa; --primary-dark: #8b5cf6;
  --accent: #c4b5fd; --accent-light: #1e1b4b;
  --bg: #0b1120; --card: #1e293b;
  --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
  --highlight: #854d0e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;transition:background var(--transition),color var(--transition)}
.container{max-width:1000px;margin:0 auto;padding:16px 20px}

.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:16px 24px;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{font-size:32px}
.header-title{font-size:22px;font-weight:800}
.header-subtitle{font-size:13px;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:12px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--accent-light);color:var(--primary-dark);border-radius:20px;font-size:13px;font-weight:600}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn-outline:hover{background:var(--accent-light)}
.btn-sm{padding:6px 14px;font-size:13px}
.theme-toggle{width:40px;height:40px;border:2px solid var(--border);border-radius:50%;background:var(--card);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.theme-toggle:hover{border-color:var(--primary);transform:rotate(15deg)}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:16px;border:1px solid var(--border)}

/* ── Search ── */
.search-box{display:flex;gap:8px;margin-bottom:16px}
.search-box input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;background:var(--card);color:var(--text);transition:border-color var(--transition)}
.search-box input:focus{outline:none;border-color:var(--primary)}
.search-box input::placeholder{color:var(--muted)}

/* ── Filters ── */
.filter-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-tag{padding:4px 14px;border:1px solid var(--border);border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition);color:var(--muted)}
.filter-tag:hover,.filter-tag.active{border-color:var(--primary);color:var(--primary);background:var(--accent-light)}

/* ── Results ── */
.result-count{font-size:13px;color:var(--muted);margin-bottom:12px}
.result-item{padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;transition:all var(--transition)}
.result-item:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.result-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.result-title{font-weight:700;font-size:15px}
.result-source{font-size:12px;color:var(--muted)}
.result-snippet{font-size:14px;line-height:1.7;color:var(--text)}
.result-snippet mark{background:var(--highlight);color:inherit;padding:1px 3px;border-radius:2px;font-weight:600}
.result-score{font-size:11px;color:var(--muted)}

/* ── Doc Browser ── */
.doc-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.doc-card{padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm);transition:all var(--transition);cursor:pointer}
.doc-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.doc-card-title{font-weight:700;font-size:14px;margin-bottom:4px}
.doc-card-meta{font-size:12px;color:var(--muted)}
.doc-card-desc{font-size:13px;color:var(--muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;margin-bottom:16px;overflow-x:auto}
.tab-btn{padding:10px 20px;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:var(--radius-sm) var(--radius-sm) 0 0;font-family:inherit;white-space:nowrap;transition:all var(--transition)}
.tab-btn:hover{color:var(--text);background:var(--accent-light)}
.tab-btn.active{color:var(--primary);border-bottom:3px solid var(--primary)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── Synonym expand ── */
.synonym-info{font-size:12px;color:var(--muted);margin-bottom:12px;padding:8px 12px;background:var(--accent-light);border-radius:var(--radius-sm)}
.synonym-info span{font-weight:600;color:var(--primary)}

/* ── Toast ── */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:2000;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;color:#fff;background:#1e293b;box-shadow:var(--shadow-lg);animation:toastIn .3s ease}
.toast.success{background:var(--success)}
.toast.warn{background:var(--warning);color:#1e293b}
.toast.out{animation:toastOut .3s ease forwards}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);max-width:800px;width:90vw;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .3s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:36px;height:36px;border:none;background:transparent;font-size:24px;cursor:pointer;border-radius:50%;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--border)}
.modal-body{padding:24px;overflow-y:auto;flex:1;line-height:1.8;font-size:14px}

.footer{text-align:center;padding:16px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:24px}

@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(16px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

@media (max-width:900px){
  .container{padding:10px 12px}
  .header{padding:12px 16px}
  .card{padding:16px}
  .search-box input{font-size:15px}
}
@media (max-width:480px){
  .header-title{font-size:16px}
  .header-logo{font-size:24px}
  .btn{padding:8px 14px;font-size:12px}
}
</style>
</head>
<body>

<div class="container">
<header class="header">
  <div class="header-brand">
    <span class="header-logo">🔍</span>
    <div>
      <div class="header-title">PolicySearch</div>
      <div class="header-subtitle">政策文件关键词搜索 · 同义词扩展 · 按相关度排序</div>
    </div>
  </div>
  <div class="header-right">
    <span class="badge" id="docCount">📚 预置文档</span>
    <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
  </div>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" data-tab="search">🔍 搜索</button>
  <button class="tab-btn" data-tab="browse">📚 浏览文档</button>
</div>

<!-- ═══════════ SEARCH TAB ═══════════ -->
<div class="tab-content active" id="tab-search">
  <div class="card">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="输入关键词，如：乡村振兴 基层治理 共同富裕…" autofocus>
      <button class="btn btn-primary" id="btnSearch">🔍 搜索</button>
    </div>
    <div class="filter-tags" id="filterTags"></div>
    <div class="synonym-info" id="synonymInfo" style="display:none"></div>
    <div class="result-count" id="resultCount"></div>
    <div id="searchResults"></div>
  </div>
</div>

<!-- ═══════════ BROWSE TAB ═══════════ -->
<div class="tab-content" id="tab-browse">
  <div class="card">
    <div style="font-weight:700;font-size:16px;margin-bottom:4px">📚 政策文件目录</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">点击文档查看全文，或在搜索 Tab 中进行关键词检索</div>
    <div class="filter-tags" id="browseFilterTags"></div>
    <div class="doc-list" id="docList"></div>
  </div>
</div>

<div class="footer">
  ⚡ 数据不上传服务器 · 关键词匹配+同义词扩展 · 非 AI 语义搜索 &nbsp;|&nbsp; PolicySearch v1.0.0
</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">文档标题</span>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
//  INVERTED INDEX (2-gram)
// ═══════════════════════════════════════════════
var INDEX = {};  // { ngram: { docId: [positions] } }

function buildIndex() {
  INDEX = {};
  DOCUMENTS.forEach(function(doc) {
    var text = doc.content;
    // Extract all 2-grams
    for (var i = 0; i < text.length - 1; i++) {
      var ng = text.substring(i, i + 2);
      if (!INDEX[ng]) INDEX[ng] = {};
      if (!INDEX[ng][doc.id]) INDEX[ng][doc.id] = [];
      INDEX[ng][doc.id].push(i);
    }
  });
  // Also index 1-grams for single-char queries
  for (var i = 0; i < text.length; i++) {
    var ng = text[i];
    if (!/[一-鿿]/.test(ng)) continue;
    if (!INDEX[ng]) INDEX[ng] = {};
    if (!INDEX[ng][doc.id]) INDEX[ng][doc.id] = [];
    INDEX[ng][doc.id].push(i);
  }
}

// ═══════════════════════════════════════════════
//  SEARCH ENGINE
// ═══════════════════════════════════════════════
function expandQuery(query) {
  var terms = [query];
  // Check direct synonym
  if (SYNONYM_MAP[query]) {
    terms = terms.concat(SYNONYM_MAP[query]);
  }
  // Check if query is a value in any synonym entry
  Object.keys(SYNONYM_MAP).forEach(function(key) {
    if (SYNONYM_MAP[key].indexOf(query) !== -1) {
      if (terms.indexOf(key) === -1) terms.push(key);
      SYNONYM_MAP[key].forEach(function(v) {
        if (terms.indexOf(v) === -1) terms.push(v);
      });
    }
  });
  // Partial overlap: if query is a substring of a key or vice versa
  Object.keys(SYNONYM_MAP).forEach(function(key) {
    if (key.indexOf(query) !== -1 || query.indexOf(key) !== -1) {
      if (terms.indexOf(key) === -1) terms.push(key);
      SYNONYM_MAP[key].forEach(function(v) {
        if (terms.indexOf(v) === -1) terms.push(v);
      });
    }
  });
  return terms;
}

function search(query, filterCat) {
  if (!query.trim()) return { results: [], expandedTerms: [] };

  var expandedTerms = expandQuery(query.trim());
  var docScores = {};  // { docId: score }

  expandedTerms.forEach(function(term) {
    var subResults = searchTerm(term);
    Object.keys(subResults).forEach(function(docId) {
      if (filterCat) {
        var doc = DOCUMENTS.find(function(d) { return d.id === docId; });
        if (!doc || doc.category !== filterCat) return;
      }
      docScores[docId] = (docScores[docId] || 0) + subResults[docId];
    });
  });

  // Convert to sorted array
  var results = Object.keys(docScores).map(function(docId) {
    var doc = DOCUMENTS.find(function(d) { return d.id === docId; });
    return { doc: doc, score: docScores[docId], highlights: getHighlights(doc, expandedTerms) };
  }).filter(function(r) { return r.doc && r.score > 0; });

  results.sort(function(a, b) { return b.score - a.score; });

  return { results: results, expandedTerms: expandedTerms.filter(function(t) { return t !== query.trim(); }) };
}

function searchTerm(term) {
  var scores = {};
  // Use 2-grams from the term
  var ngrams = [];
  for (var i = 0; i < term.length - 1; i++) ngrams.push(term.substring(i, i + 2));
  if (term.length === 1) ngrams.push(term);

  // Also try full term as exact match
  DOCUMENTS.forEach(function(doc) {
    var count = countOccurrences(doc.content, term);
    if (count > 0) {
      scores[doc.id] = (scores[doc.id] || 0) + count * 5; // exact match bonus
    }
  });

  // N-gram matching
  ngrams.forEach(function(ng) {
    var posting = INDEX[ng];
    if (!posting) return;
    Object.keys(posting).forEach(function(docId) {
      scores[docId] = (scores[docId] || 0) + posting[docId].length;
    });
  });

  // Normalize by document length (BM25-like)
  Object.keys(scores).forEach(function(docId) {
    var doc = DOCUMENTS.find(function(d) { return d.id === docId; });
    if (doc) scores[docId] = scores[docId] / (1 + Math.log(doc.content.length / 100));
  });

  return scores;
}

function countOccurrences(text, term) {
  var count = 0, pos = 0;
  while ((pos = text.indexOf(term, pos)) !== -1) { count++; pos += term.length; }
  return count;
}

function getHighlights(doc, terms) {
  var text = doc.content;
  var snippets = [];
  var windowSize = 80;

  terms.forEach(function(term) {
    var pos = 0;
    while ((pos = text.indexOf(term, pos)) !== -1) {
      var start = Math.max(0, pos - windowSize / 2);
      var end = Math.min(text.length, pos + term.length + windowSize / 2);
      var snippet = text.substring(start, end);
      if (start > 0) snippet = '…' + snippet;
      if (end < text.length) snippet = snippet + '…';
      // Highlight all expanded terms
      terms.forEach(function(t) {
        snippet = snippet.split(t).join('<mark>' + t + '</mark>');
      });
      snippets.push(snippet);
      pos += term.length;
      if (snippets.length >= 3) break;
    }
  });

  return snippets.slice(0, 3);
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
var currentFilter = null;

function renderDocList(filterCat) {
  var docs = filterCat ? DOCUMENTS.filter(function(d) { return d.category === filterCat; }) : DOCUMENTS;
  var html = '';
  docs.forEach(function(doc) {
    html += '<div class="doc-card" onclick="openDoc(\'' + doc.id + '\')">';
    html += '<div class="doc-card-title">' + escHtml(doc.title) + '</div>';
    html += '<div class="doc-card-meta">' + doc.year + ' · ' + doc.category + '</div>';
    html += '<div class="doc-card-desc">' + escHtml(doc.desc) + '</div>';
    html += '</div>';
  });
  document.getElementById('docList').innerHTML = html || '<div style="color:var(--muted)">暂无文档</div>';
}

function renderBrowseFilters() {
  var cats = {};
  DOCUMENTS.forEach(function(d) { cats[d.category] = true; });
  var html = '<span class="filter-tag active" data-cat="">全部 (' + DOCUMENTS.length + ')</span>';
  Object.keys(cats).forEach(function(c) {
    html += '<span class="filter-tag" data-cat="' + c + '">' + c + '</span>';
  });
  document.getElementById('browseFilterTags').innerHTML = html;

  document.querySelectorAll('#browseFilterTags .filter-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      document.querySelectorAll('#browseFilterTags .filter-tag').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      renderDocList(this.getAttribute('data-cat') || null);
    });
  });
}

function renderSearchFilters() {
  var cats = {};
  DOCUMENTS.forEach(function(d) { cats[d.category] = true; });
  var html = '<span class="filter-tag active" data-cat="">全部</span>';
  Object.keys(cats).forEach(function(c) {
    html += '<span class="filter-tag" data-cat="' + c + '">' + c + '</span>';
  });
  document.getElementById('filterTags').innerHTML = html;

  document.querySelectorAll('#filterTags .filter-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      document.querySelectorAll('#filterTags .filter-tag').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.getAttribute('data-cat') || null;
      doSearch();
    });
  });
}

function doSearch() {
  var query = document.getElementById('searchInput').value;
  if (!query.trim()) {
    document.getElementById('searchResults').innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted)">输入关键词开始搜索</div>';
    document.getElementById('resultCount').textContent = '';
    document.getElementById('synonymInfo').style.display = 'none';
    return;
  }

  var result = search(query, currentFilter);

  document.getElementById('resultCount').textContent = '找到 ' + result.results.length + ' 篇相关文档';

  // Synonym info
  if (result.expandedTerms.length) {
    document.getElementById('synonymInfo').style.display = '';
    document.getElementById('synonymInfo').innerHTML = '🔄 同义词扩展：<span>' + result.expandedTerms.join('、') + '</span>';
  } else {
    document.getElementById('synonymInfo').style.display = 'none';
  }

  if (!result.results.length) {
    document.getElementById('searchResults').innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted)">🔍 未找到相关结果，试试其他关键词</div>';
    return;
  }

  var html = '';
  result.results.forEach(function(r) {
    html += '<div class="result-item" onclick="openDoc(\'' + r.doc.id + '\')">';
    html += '<div class="result-header"><span class="result-title">' + escHtml(r.doc.title) + '</span>';
    html += '<span class="result-source">' + r.doc.year + ' · ' + r.doc.category + '</span></div>';
    if (r.highlights.length) {
      html += '<div class="result-snippet">' + r.highlights[0] + '</div>';
      if (r.highlights.length > 1) {
        html += '<div class="result-snippet" style="margin-top:8px">' + r.highlights[1] + '</div>';
      }
    }
    html += '<div class="result-score">相关度：' + Math.round(r.score) + '</div>';
    html += '</div>';
  });
  document.getElementById('searchResults').innerHTML = html;
}

function openDoc(docId) {
  var doc = DOCUMENTS.find(function(d) { return d.id === docId; });
  if (!doc) return;
  document.getElementById('modalTitle').textContent = doc.title + '（' + doc.year + '）';
  var html = '<div style="margin-bottom:12px;font-size:13px;color:var(--muted)">分类：' + doc.category + '</div>';
  html += '<div style="white-space:pre-wrap">' + escHtml(doc.content) + '</div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.classList.add('out'); setTimeout(function() { if(el.parentNode)el.parentNode.removeChild(el); }, 300); }, 2000);
}

function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme');
  var next = cur === 'dark' ? '' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeToggle').textContent = next ? '☀️' : '🌙';
  try { localStorage.setItem('policysearch_theme', next || 'light'); } catch(e) {}
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-tab') === name); });
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.toggle('active', c.id === 'tab-' + name); });
}

//  INIT
// ═══════════════════════════════════════════════
function init() {
  buildIndex();

  // Theme
  try {
    var tm = localStorage.getItem('policysearch_theme');
    if (tm === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  } catch(e) {}
  document.getElementById('themeToggle').textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  document.getElementById('docCount').textContent = '📚 ' + DOCUMENTS.length + ' 份文档';

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { switchTab(this.getAttribute('data-tab')); });
  });

  // Search
  renderSearchFilters();
  document.getElementById('btnSearch').addEventListener('click', doSearch);
  document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });

  // Browse
  renderBrowseFilters();
  renderDocList();

  // Modal
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

  // Test mode
  if (window.location.search.indexOf('test=1') !== -1) setTimeout(runTests, 300);
}

// ═══════════════════════════════════════════════
//  TESTS
// ═══════════════════════════════════════════════
function runTests() {
  var results = [];
  function t(name, fn) {
    try { results.push({ name: name, pass: !!fn() }); }
    catch(e) { results.push({ name: name, pass: false, error: e.message }); }
  }

  t('DOCUMENTS has 8 entries', function() { return DOCUMENTS.length === 8; });
  t('All docs have content', function() { return DOCUMENTS.every(function(d) { return d.content.length > 50; }); });
  t('INDEX built', function() { return Object.keys(INDEX).length > 100; });
  t('expandQuery: 乡村振兴', function() { return expandQuery('乡村振兴').length >= 3; });
  t('expandQuery: 基层治理', function() { return expandQuery('基层治理').length >= 2; });
  t('search: 乡村振兴 returns results', function() { return search('乡村振兴').results.length > 0; });
  t('search: 共同富裕 returns results', function() { return search('共同富裕').results.length > 0; });
  t('search: empty query', function() { return search('').results.length === 0; });
  t('search with filter', function() { var r = search('法治', '法治'); return r.results.length > 0; });
  t('SYNONYM_MAP has 20+ entries', function() { return Object.keys(SYNONYM_MAP).length >= 20; });

  var passed = results.filter(function(r) { return r.pass; }).length;
  var total = results.length;
  var color = passed === total ? 'green' : 'orange';
  console.log('%c📋 PolicySearch Tests: ' + passed + '/' + total + ' passed', 'font-size:16px;font-weight:bold;color:' + color);
  results.forEach(function(r) { console.log(r.pass ? '  ✅' : '  ❌', r.name, r.error ? '(' + r.error + ')' : ''); });
  if (passed < total) console.warn('⚠ ' + (total - passed) + ' tests failed');
  else console.log('✅ All tests passed!');
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
